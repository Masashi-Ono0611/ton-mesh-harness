# [D1] #19 — CI workflow.
# Runs the full quality bar on every PR + main push:
#   - Lint (eslint src/sdk, no-console rule)
#   - Type-check (tsc --noEmit with noUnusedLocals + strict)
#   - Tests (vitest, RUN_DAEMON_TESTS skipped — those spawn real daemons)
#   - Build (bun build — dual bin + SDK entry; tsc emits the SDK .d.ts)
#   - CLI smoke (dist/cli.js --version / --help / invalid flag)
#   - MCP smoke (initialize + tools/list via stdio)
#   - SDK smoke (require('dist/sdk.js') shape check)
#   - npm pack --dry-run (tarball manifest sanity)
#
# Matrix: Node 18 / 20 / 22 × ubuntu-latest / macos-latest.
# Windows is in scope per `package.json` "os" but we skip in CI — the
# kit's daemon binaries are platform-pinned and the network probes have
# different timing; cover Windows manually before tagging GA.

name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['**']  # tags trigger their own publish flow elsewhere
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      # Node still runs the smoke scripts below — the published artifact must
      # load on plain Node (consumers use npx / node, never Bun), so the
      # matrix Node version drives the cli / mcp / sdk smokes.
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (SDK no-console gate)
        run: bun run lint

      - name: Type-check
        run: bun run typecheck
        env:
          # Some transitive packages push tsc memory usage; bump headroom.
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Tests
        run: bun run test
        env:
          # RUN_DAEMON_TESTS gates the live tonutils-storage spawn tests.
          # CI does NOT spawn daemons (they download a 12 MB binary on
          # first run and the network is flaky in GitHub runners); the
          # skipped daemon tests are expected.
          RUN_DAEMON_TESTS: ''
          # RUN_MCP_INTEGRATION gates test/mcp-cancel.integration.test.ts
          # (#31 — real daemon + MCP notifications/cancelled cleanup). Same
          # policy as RUN_DAEMON_TESTS: off in the default matrix (spawns the
          # real daemon). Flip to '1' on a dedicated runner to exercise it.
          RUN_MCP_INTEGRATION: ''

      - name: Build
        run: bun run build

      - name: CLI smoke (--help / --version / invalid flag)
        # Added in rc5 after the rc2-rc4 walletkit dir-import bug. The
        # MCP smoke only loads dist/mcp.js, so a CLI-side regression
        # (different require chain) wouldn't trip it. This smoke runs
        # `dist/cli.js --version` + `--help` + a deliberately-invalid
        # --wallet-mode value, asserts no ERR_UNSUPPORTED_DIR_IMPORT.
        # Catches walletkit (or any deep dep) packaging regressions
        # before they ship.
        run: node scripts/cli-smoke.cjs

      - name: MCP smoke (initialize + tools/list)
        # Portable Node harness (scripts/mcp-smoke.cjs) — replaces the
        # earlier bash + GNU `timeout` + grep recipe. `timeout` isn't on
        # macOS runners by default. The Node harness spawns dist/mcp.js,
        # speaks JSON-RPC over stdio, parses responses, asserts on
        # serverInfo + both tool names. Exits non-zero with a clear
        # message on any failure.
        run: node scripts/mcp-smoke.cjs

      - name: MCP HTTP smoke (initialize + tools/list over --http)
        # #33 — spawns `dist/mcp.js --http :18765`, drives initialize →
        # notifications/initialized → tools/list over the Streamable-HTTP
        # transport (loopback, no token), asserts serverInfo + 3 tools.
        run: node scripts/mcp-http-smoke.cjs

      - name: SDK smoke (programmatic require shape)
        # The SDK external entry (dist/sdk.js) is the surface npm
        # consumers see via `require('ton-mesh-harness')`. This
        # smoke require()s the bundle directly, asserts every function
        # entry point + zod schema + tool descriptor + VERSION-vs-
        # package.json pin. Catches accidental drops from src/sdk.ts
        # (the public barrel) that the binary smokes wouldn't see.
        run: node scripts/sdk-smoke.cjs

      - name: npm pack dry-run (tarball manifest sanity)
        # Surfaces packaging regressions early — e.g. forgetting to add
        # a new ship-time directory to package.json::files (caught the
        # templates/ omission in rc5 development). Doesn't publish;
        # the dry-run just emits the file list.
        run: npm pack --dry-run

      - name: Tarball install + run smoke
        # End-to-end harness: packs the kit, installs the tarball
        # into a fresh tmpdir-sandbox, runs the installed CLI bin
        # (--version + --help), require()s the SDK from the install,
        # confirms the MCP bin is launchable. Catches the failure
        # mode where `dist/*` builds locally but the published shape
        # (files allowlist + bin path + exports field) is wrong.
        # This would have flagged the rc5 templates/ omission AT
        # CI time, not via post-pack inspection.
        run: node scripts/tarball-smoke.cjs

      - name: E2E MCP stage 1 (V3 #18 — handshake + tools/list + check_env)
        # The V3 acceptance driver (scripts/e2e-mcp-deploy.cjs). Unarmed
        # in CI: with no E2E_AUTO_SIGN it exercises the zero-cost MCP
        # surface (initialize → tools/list → mesh_check_env) and
        # gracefully skips the deploy stage, exiting 0. The armed
        # mainnet deploy stage spends real TON and stays a manual,
        # operator-run step (see docs/v0.8/e2e-runbook.md) — there is
        # deliberately no mainnet seed in CI secrets.
        run: node scripts/e2e-mcp-deploy.cjs

  # #76 — the structural catch for the #74 keyring case bug ("passes on
  # macOS, aborts on case-sensitive Linux"). A single Linux runner that
  # actually downloads + spawns rldp-http-proxy and asserts it loads the
  # keyring and stays up. Separate from the matrix (heavier: binary download
  # + FUSE) and not in the default `bun run test` run (RUN_DAEMON_TESTS gated).
  rldp-integration:
    name: rldp-http-proxy live spawn (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install FUSE3
        # rldp-http-proxy ships as an AppImage; without `fusermount3` it
        # exits 127. ubuntu-latest runners have /dev/fuse + can apt-install it.
        run: sudo apt-get update && sudo apt-get install -y fuse3

      - name: rldp-http-proxy live spawn (RUN_DAEMON_TESTS=1)
        # Downloads the binary via ensureRldpHttpProxyBinary, mints + loads a
        # keyring, binds the proxy to loopback, asserts it stays up + serves.
        run: bunx vitest run test/daemon/rldp-http-proxy-process.integration.test.ts
        env:
          RUN_DAEMON_TESTS: '1'
